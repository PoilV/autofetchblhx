name: Fetch BLHX APK

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download config
        run: |
          curl -L https://static.biligame.com/config/blhx.config.js -o config.js

      - name: Extract APK URL
        run: |
          APK_URL=$(grep -oP 'https://[^"]+\.apk' config.js | head -n1)
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Extract version
        run: |
          FILE_NAME=$(basename "$APK_URL")
          VERSION=$(echo "$FILE_NAME" | cut -d '_' -f2)
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check existing release
        id: check
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop if exists
        if: steps.check.outputs.exists == 'true'
        run: echo "Release exists, skip."

      - name: Download APK
        if: steps.check.outputs.exists == 'false'
        run: |
          curl -L "$APK_URL" -o "$FILE_NAME"

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: BLHX v${{ env.VERSION }}
          files: ${{ env.FILE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README
        if: steps.check.outputs.exists == 'false'
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${FILE_NAME}"

          cat > README.md <<EOF
# BLHX APK Mirror

Latest Version: **${VERSION}**

Download:
${DOWNLOAD_URL}

Last Update:
$(date -u +"%Y-%m-%d %H:%M UTC")
EOF

      - name: Commit README
        if: steps.check.outputs.exists == 'false'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update README for v${VERSION}" || exit 0
          git push
