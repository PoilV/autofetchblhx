name: Fetch BLHX APK

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download config
        run: |
          curl -L https://static.biligame.com/config/blhx.config.js -o config.js

      - name: Extract APK URL
        run: |
          APK_URL=$(grep -oP 'https://[^"]+\.apk' config.js | head -n1)
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV
          echo "APK_URL=$APK_URL"

      - name: Get filename
        run: |
          FILE_NAME=$(basename "$APK_URL")
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Download APK
        run: |
          curl -L "$APK_URL" -o "$FILE_NAME"

      - name: Create tag
        id: tag
        run: |
          TAG="auto-$(date +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: BLHX ${{ steps.tag.outputs.tag }}
          files: ${{ env.FILE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
